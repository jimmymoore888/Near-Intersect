<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Near Intersect Volcano</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#040505;
  color:#f4f4f4;
}

main {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 {
  color:#00ffd5;
}

.card {
  background:#0b0d0d;
  border:1px solid #262b2b;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

button {
  padding:10px 14px;
  margin-right:8px;
  background:#00ffd5;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input {
  display:block;
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111414;
  border:1px solid #262b2b;
  color:#fff;
  border-radius:8px;
}
</style>
</head>

<body>

<main>

<h1 style="text-align:center;">TEST PAGE LOADED</h1>

<h1>NEAR INTERSECT VOLCANO</h1>

<section class="card">
  <h2>Public View Count</h2>

  <div style="font-size:22px; color:#00ffd5;">
    68,291 launch-watchers waiting for launch 🚀
  </div>

  <div style="margin-top:8px; color:#aaa;">
    +1 local view on this device
  </div>

  <div style="color:#aaa;">
    2,783 shares
  </div>
</section>

<section class="card">
  <h2>Create Profile</h2>

  <p>Create your early access profile.</p>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <div style="margin-top:10px;">
    <button onclick="createProfile()">Create Profile</button>
    <button onclick="login()">Log In</button>
    <button onclick="logout()">Log Out</button>
  </div>

  <p id="status" style="margin-top:10px; color:#00ffd5;">
    No profile active.
  </p>
</section>

</main>

<script>
function createProfile() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  if (!u || !p) {
    setStatus("Enter username and password.");
    return;
  }

  localStorage.setItem("user", u);
  localStorage.setItem("pass", p);
  localStorage.setItem("logged", "true");

  setStatus("Profile created. Logged in as " + u);
}

function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  const su = localStorage.getItem("user");
  const sp = localStorage.getItem("pass");

  if (!su || !sp) {
    setStatus("No profile found. Create one first.");
    return;
  }

  if (u === su && p === sp) {
    localStorage.setItem("logged", "true");
    setStatus("Logged in as " + u);
  } else {
    setStatus("Incorrect username or password.");
  }
}

function logout() {
  localStorage.setItem("logged", "false");
  setStatus("Logged out.");
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

window.onload = function () {
  const u = localStorage.getItem("user");
  const logged = localStorage.getItem("logged");

  if (u && logged === "true") {
    setStatus("Logged in as " + u);
  }
};
</script>

</body>
</html>
